[DEFAULT]
# This section is for comments or default values

[clusters]
# 預設叢集 id（須與下方 [cluster_<id>] 後綴一致）。可被環境變數 CLUSTER_ID 覆蓋。
active_cluster = h6c1

[cluster_h6c1]
cluster_name = h6c1
# 與邏輯叢集 h6c1 對應的登入／服務節點短 hostname（可多個，逗號分隔）。含 * ? 時為 fnmatch。
# 例：h6dm1、h6ln1 皆視為 h6c1；若實際主機名有階層可用 h6dm*、h6ln*。
host_aliases = h6dm1, h6ln1
total_cpu_nodes = 3840
total_gpu_cores = 384

[cluster_h6c2]
cluster_name = h6c2
host_aliases = h6dm2, h6ln2
total_cpu_nodes = 1920
total_gpu_cores = 128

[database]
# For SQLite, the database is a file. We'll store its path in .env

[redis]
# We will use environment variables for redis_host and redis_port

[data]
# The directory where new log files will be placed (部署時請改為叢集上實際路徑，見 DEPLOY.md)
log_directory_path = /path/to/your/cluster_job_logs/

[log_schema]
# Define the column names from the raw log file, in order
column_names = JobID, JobName, UserName, UserGroup, Queue, JobStatus, Nodes, Cores, Memory, RunTime, RunTimeSeconds, QueDateYear, QueDateMonth, QueDateDay, QueDateHour, QueDateMinute, QueDateSecond, StartDateYear, StartDateMonth, StartDateDay, StartDateHour, StartDateMinute, StartDateSecond, ElapseLimiteSecond
